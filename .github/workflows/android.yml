name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify unit tests, lint and both environments
        run: |
          ./gradlew \
            testDevDebugUnitTest \
            lintDevDebug \
            assembleDevDebug \
            assembleProdDebug \
            --stacktrace
